services:
  app:
    build:
      context: .
      args:
        NODE_VERSION: 22.14.0
        NGINX_VERSION: alpine
        PNPM_VERSION: latest
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VCS_REF: ${VCS_REF:-$(git rev-parse --short HEAD)}
        APP_TITLE: "Frontend Application"
        APP_DESCRIPTION: "Production image for frontend application"
        APP_REPO: "your-org/your-repo"
    image: frontend-app:${TAG:-latest}
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    user: "101:101"  # nginx user
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - app-network

networks:
  app-network:
    driver: bridge